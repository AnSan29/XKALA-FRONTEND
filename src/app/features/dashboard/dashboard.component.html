<div class="dashboard-wrapper">
  <!-- HERO / PORTADA -->
  <div class="hero-section">
    <div class="hero-overlay"></div>

    <div class="container hero-content">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="fw-bold text-white mb-1">¡Hola, Andrés!</h1>
          <p class="text-light opacity-75 mb-0">
            Estado: {{ estaRegistrado ? 'Jornada Activa' : 'Fuera de Turno' }}
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- CARD FLOTANTE -->
  <div class="container floating-container">
    <div class="row justify-content-center">
      <div class="col-md-10 col-lg-6">
        <!-- ENTRADA -->
        <div class="card xkala-card shadow-lg border-0 mb-4" *ngIf="!estaRegistrado">
          <div class="card-header xkala-header">
            <h5 class="mb-0"><i class="bi bi-geo-alt-fill me-2"></i> Registro de Entrada</h5>
          </div>

          <div class="card-body">
            <p class="small text-muted mb-3">Confirma que tienes puesto tu equipo de protección:</p>

            <div class="list-group list-group-flush mb-3">
              <label
                class="list-group-item d-flex justify-content-between align-items-center"
                *ngFor="let item of eppItems"
              >
                <span>
                  <i class="bi bi-check-circle-fill text-success me-2"></i>
                  {{ item.label }}
                </span>

                <input class="form-check-input" type="checkbox" [(ngModel)]="eppStatus[item.id]" />
              </label>
            </div>

            <button
              class="btn btn-primary w-100 py-3 fw-bold"
              (click)="marcarEntrada()"
              [disabled]="loading"
            >
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              INICIAR JORNADA
            </button>
          </div>
        </div>

        <!-- SALIDA -->
        <div class="card xkala-card shadow-lg border-0" *ngIf="estaRegistrado">
          <div class="card-header xkala-header-danger">
            <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i> Finalizar Jornada</h5>
          </div>

          <div class="card-body">
            <div class="mb-3">
              <label class="form-label small fw-bold">Motivo de salida</label>
              <select class="form-select" [(ngModel)]="salidaData.motivo">
                <option value="finalizacion">Fin de turno</option>
                <option value="requerimiento">Requerimiento</option>
                <option value="cancelacion">Cancelación</option>
                <option value="otros">Otro</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-bold">Observaciones</label>
              <textarea
                class="form-control"
                rows="2"
                [(ngModel)]="salidaData.observacion"
              ></textarea>
            </div>

            <button
              class="btn btn-dark w-100 py-3 fw-bold"
              (click)="marcarSalida()"
              [disabled]="
                loading ||
                ((salidaData.motivo === 'cancelacion' || salidaData.motivo === 'otros') &&
                  !salidaData.observacion)
              "
            >
              REGISTRAR SALIDA
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
