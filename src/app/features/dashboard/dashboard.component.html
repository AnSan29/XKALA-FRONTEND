<div class="dashboard-layout">
  <div class="hero-side">
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h2>¡Hola, Andrés!</h2>
      <p class="status-badge">
        Estado:
        <span>{{ estaRegistrado ? 'Jornada Activa' : 'Fuera de Turno' }}</span>
      </p>
    </div>

    <div class="avatar-wrapper">
      <div class="avatar">
        <i class="bi bi-person-fill"></i>
      </div>

      <div class="hero-action">
        <button
          [class]="estaRegistrado ? 'btn btn-dark' : 'btn btn-primary'"
          class="fw-bold toggle-btn"
          (click)="togglePanel()"
        >
          {{ estaRegistrado ? 'FINALIZAR JORNADA' : 'INICIAR JORNADA' }}
        </button>
      </div>
    </div>
  </div>

  <div class="content-side">
    <!-- 👇 NUEVO WRAPPER -->
    <div class="panel-wrapper" [class.open]="panelOpen">
      <div class="form-container">
        <div class="xkala-panel">
          <!-- ENTRADA -->
          <div *ngIf="!estaRegistrado" class="fade-in">
            <p class="small mb-3 text-secondary-custom">Confirma tu equipo de protección:</p>

            <div class="list-group list-group-flush mb-4">
              <label
                class="list-group-item d-flex justify-content-between align-items-center"
                *ngFor="let item of eppItems"
              >
                <span class="d-flex align-items-center">
                  <i
                    class="bi me-2"
                    [class.bi-check-circle-fill]="eppStatus[item.id]"
                    [class.bi-circle]="!eppStatus[item.id]"
                  ></i>
                  {{ item.label }}
                </span>

                <input class="form-check-input" type="checkbox" [(ngModel)]="eppStatus[item.id]" />
              </label>
            </div>

            <button class="btn btn-primary w-100 fw-bold" (click)="marcarEntrada()">
              CONFIRMAR ENTRADA
            </button>
          </div>

          <!-- SALIDA -->
          <div *ngIf="estaRegistrado" class="fade-in">
            <!-- igual que ya lo tienes -->
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
