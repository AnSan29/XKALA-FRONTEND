<!-- BOTÓN HAMBURGUESA -->
<button *ngIf="!isOpen" class="btn btn-xkala btn-hamburger" (click)="toggleSidebar()">
  <i class="bi bi-list"></i>
</button>

<div
  [ngClass]="[
    themeService.isDarkMode() ? 'bg-xkala-dark-gray text-white' : 'bg-white text-dark',
    isOpen ? 'sidebar-open' : 'sidebar-closed',
    'border-end shadow-sm sidebar',
  ]"
  id="sidebar-wrapper"
  style="min-height: 100vh"
>
  <!-- BOTÓN CERRAR (AHORA BIEN ANCLADO) -->
  <button class="btn btn-close-sidebar" (click)="toggleSidebar()">
    <i class="bi bi-x-lg"></i>
  </button>

  <div
    class="sidebar-heading border-bottom py-4 px-3 text-center d-flex align-items-center justify-content-center"
  >
    <img
      [src]="
        themeService.isDarkMode()
          ? 'assets/img/Logo_negro_XKALA.png'
          : 'assets/img/Logo_claro_XKALA.png'
      "
      alt="Logo XKALA"
      class="img-fluid w-100"
      style="max-height: 120px; object-fit: contain"
    />
  </div>

  <div class="list-group list-group-flush mt-3 px-2">
    <a
      routerLink="/asistencia"
      routerLinkActive="active-link"
      class="list-group-item list-group-item-action"
      (click)="isOpen = false"
    >
      <i class="bi bi-clock-history me-3"></i> Registro de asistencia
    </a>
  </div>

  <div class="mt-auto p-4 border-top" [class.bg-black-opacity]="themeService.isDarkMode()">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <span class="small fw-bold">
        <i
          class="bi"
          [class.bi-moon-fill]="themeService.isDarkMode()"
          [class.bi-sun-fill]="!themeService.isDarkMode()"
        ></i>
        {{ themeService.isDarkMode() ? 'MODO OSCURO' : 'MODO CLARO' }}
      </span>

      <div class="form-check form-switch custom-switch">
        <input
          class="form-check-input"
          type="checkbox"
          (change)="themeService.toggleTheme()"
          [checked]="themeService.isDarkMode()"
        />
      </div>
    </div>

    <button
      (click)="logout()"
      [class]="themeService.isDarkMode() ? 'btn-outline-light' : 'btn-outline-danger'"
      class="btn w-100 py-2 fw-bold shadow-sm"
    >
      <i class="bi bi-box-arrow-left me-2"></i>CERRAR SESIÓN
    </button>
  </div>
</div>
